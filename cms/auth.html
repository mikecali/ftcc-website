<!DOCTYPE html>
<html>
<head><title>FTCC CMS Auth</title></head>
<body>
<p>Completing login, please wait...</p>
<script>
  var hash = window.location.hash.substring(1);
  var params = new URLSearchParams(hash);
  var token = params.get('token');
  if (token) {
    localStorage.setItem('netlify-cms-user', JSON.stringify({
      token: token,
      provider: 'github'
    }));
    window.location.href = '/ftcc-website/cms/';
  } else {
    document.body.innerHTML = '<p>Error: no token found. <a href="/ftcc-website/cms/">Try again</a></p>';
  }
</script>
</body>
</html>
