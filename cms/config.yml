backend:
  name: github
  repo: mikecali/ftcc-website
  branch: main
  base_url: https://ftcc-cms-auth.mike-calizo.workers.dev
  app_id: Ov23liWzEKsZXBTmEGM7

site_url: https://mikecali.github.io/ftcc-website
display_url: https://mikecali.github.io/ftcc-website

media_folder: "images/uploads"
public_folder: "/ftcc-website/images/uploads"

collections:
  - name: "events"
    label: "Events"
    label_singular: "Event"
    folder: "content/events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    identifier_field: title
    format: json
    fields:
      - { label: "Title", name: title, widget: string }
      - label: "Status"
        name: status
        widget: select
        options:
          - { label: "Upcoming", value: upcoming }
          - { label: "Featured", value: featured }
          - { label: "Past", value: past }
        default: upcoming
      - { label: "Date", name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false, required: false }
      - { label: "Time", name: time, widget: string, required: false }
      - { label: "Location", name: location, widget: string, required: false }
      - { label: "Description", name: description, widget: text, required: false }
      - { label: "Partner", name: partner, widget: string, required: false }
      - { label: "Tags", name: tags, widget: list, required: false }
      - { label: "Image", name: image, widget: image, required: false }

  - name: "news"
    label: "News"
    label_singular: "News Post"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    identifier_field: title
    format: json
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Date", name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false, required: false }
      - { label: "Excerpt", name: excerpt, widget: string, required: false }
      - { label: "Body", name: body, widget: text, required: false }
      - { label: "Image", name: image, widget: image, required: false }
      - { label: "Tags", name: tags, widget: list, required: false }
      - { label: "Facebook Link", name: facebook_url, widget: string, required: false }
