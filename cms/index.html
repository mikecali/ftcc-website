<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FTCC CMS</title>
</head>
<body>
  <div id="nc-root"></div>

  <script>
    // Must be set before Decap loads
    window.CMS_CONFIG_URL = '/ftcc-website/cms/config.yml';
  </script>

  <script src="https://unpkg.com/decap-cms@3.1.4/dist/decap-cms.js"></script>

  <script>
    // Handle OAuth callback message from popup window
    window.addEventListener('message', function(e) {
      if (e.data && typeof e.data === 'string' && e.data.startsWith('authorization:github:success:')) {
        console.log('Auth message received:', e.data);
        // Re-post to ensure Decap catches it
        window.postMessage(e.data, window.location.origin);
        window.postMessage(e.data, '*');
      }
    });
  </script>
</body>
</html>
